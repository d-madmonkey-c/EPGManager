<div class="review-layout">
	<div class='review-panel' style="width: 15%; min-width:450px;">
		<div class="panel-header">EPG Sources</div>
		<table class="review-epg-table">
			<thead>
				<tr>
					<th class="review-epg-source">Source</th>
					<th class="review-epg-coverage">Coverage</th>
					<th class="review-epg-accuracy">Accuracy</th>
					<th class="review-epg-offsets">Offsets</th>
				</tr>
			</thead>
			<tbody>
			{0}
			</tbody>
		</table>
	</div>
	<div class="review-panel" style="width: 85%">
		<table class="review-table" id="review-table">
			<thead>
				<tr>
					<th class="review-channel-column" colspan="2">Channel</th>
					<th class="review-timeslot-column">{1:t}</th>
					<th class="review-timeslot-column">{2:t}</th>
					<th class="review-timeslot-column">{3:t}</th>
					<th class="review-timeslot-column">{4:t}</th>
					<th class="review-timeslot-column">{5:t}</th>
				</tr>
			</thead>
			<tbody>
				{6}
			</tbody>
		</table>
	</div>
</div>
