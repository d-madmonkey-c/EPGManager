<tr data-id="{0}">
	<td class="column-priority"><input style="width:100%" type='number' name='priority' value='{1}' min='1' required></td>
	<td class="column-name"><input style="width:100%" type='text' name='name' value='{2}' placeholder='EPG Source Name' required></td>
	<td class="column-url"><input style="width:100%" type='url' name='url' value='{3}' required></td>
	<td class="column-actions"><div class="icon-trash" style="float: left" onclick='removeUrlRow(this)'>
		<div class="trash-lid" style="background-color: #4d4d4d"></div>
		<div class="trash-container" style="background-color: #4d4d4d"></div>
		<div class="trash-line-1"></div>
		<div class="trash-line-2"></div>
		<div class="trash-line-3"></div>
	</div></td>
</tr>
