<div id="selected-{0}" class='channel-item'>
	<div id='gripper-{0}' class='action-button channel-gripper' draggable='true' data-id='{0}'>⁞</div>
	<div id='minus-{0}' class="action-button channel-remove" onclick='removeChannel(this.parentElement)'>←</div>
	<div class="channel-name" data-id="{0}" data-name="{1}" data-logo="{2}" data-uri="{3}" data-groups="{4}" data-epgids="{5}" onclick='showSettings(this)'>{1}</div>
</div>
