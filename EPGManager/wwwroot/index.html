<html>

<head>
	<link rel="stylesheet" href="styles.css?{0}" />
	<script src="scripts.js?{1}"></script>
</head>

<body>
	<h1>EPG Manager</h1>
	<div id="outputactions" style="width: 300px; height: 50px;">
		<button type="button" onclick="refreshOutputs()">Refresh All</button>&nbsp;&nbsp;<a href="/output/m3u">M3U Output</a>&nbsp;&nbsp;<a href="/output/epg">EPG Output</a><br />
		<div id="status-message">{2}</div>
	</div>
	<div id="progress" class="progress" style="display: none">
		<svg class="spinner" style="width: 300px; height: 50px;">
			<circle class="ringbg" cx="150" cy="25" r="20" />
			<circle class="ring" cx="150" cy="25" r="20" />
		</svg>
	</div>
	<br />

	<div class="tab-header">
		<label class="tab-label" for="tab-sources">Sources <button type="button" class="refresh-button" onclick="refreshSourcesTab()">↻</button></label>
		<label class="tab-label" for="tab-channels">Channels <button type="button" class="refresh-button" onclick="refreshChannelsTab()">↻</button></label>
		<label class="tab-label" for="tab-preview">Preview <button type="button" class="refresh-button" onclick="refreshPreviewTab()">↻</button></label>
	</div>

	<input type="radio" id="tab-sources" name="tab" class="tab" checked>
	<div id="tab-content-sources" class="tab-content">
		{3}
	</div>

	<input type="radio" id="tab-channels" name="tab" class="tab">
	<div id="tab-content-channels" class="tab-content">
		{4}
	</div>

	<input type="radio" id="tab-preview" name="tab" class="tab">
	<div id="tab-content-preview" class="tab-content">
		{5}
	</div>
	<div style='clear: both;'></div>

	<br />
	<button type="button" onclick="saveConfig()">Save</button>

	<!-- EPG Mapping Modal -->
	<div id="epg-mapping-modal" class="modal" style="display: none;">
		<div class="modal-content">
			<span class="close" onclick="closeEpgMappingModal()">&times;</span>
			<h2>Add EPG Mapping</h2>
			<div id="modal-channel-name" style="display: inline;">Channel Name</div> : <div id="modal-channel-id"
				style="display: inline;">Channel Id</div><br />
			<p>Select an EPG source and channel to map to this M3U channel.</p>
			<label for="epg-source-select" style="display: inline-block; width: 110px;">EPG Source:</label>
			<select id="epg-source-select" style="width: 475px; max-width: 475px;" onchange="loadEpgChannels()">
				<option value="">Select EPG source...</option>
			</select><br /><br />
			<label for="epg-channel-select" style="display: inline-block; width: 110px;">EPG Channel:</label>
			<select id="epg-channel-select" style="width: 475px; max-width: 475px;">
				<option value="">Select EPG source first...</option>
			</select><br /><br />
			<button id="modal-add" type="button">Add Mapping</button>
			<button type="button" onclick="closeEpgMappingModal()">Close</button>
		</div>
	</div>
</body>

</html>
